<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Category</title>
    <link rel="stylesheet" href="Home.css" />
    <style>
        .product-card { border: 1px solid #ddd; padding: 12px; margin: 10px 0; border-radius:6px; display:flex; gap:12px; align-items:flex-start; }
        .product-info { flex:1 }
        .product-name { font-size:18px; font-weight:600 }
        .tag { display:inline-block; background:#eee; padding:2px 6px; border-radius:4px; margin-right:6px; font-size:12px }
        .back-link { margin-bottom: 12px; display:inline-block }
    </style>
</head>
<body>
    <div class="page-container">
        <a class="back-link" href="Home.html">← Back to Home</a>
        <h1 id="categoryTitle">Category</h1>
        <div style="margin:12px 0">
            <input id="productSearch" type="search" placeholder="Search products in this category" style="padding:10px 14px;border-radius:10px;border:1px solid #d6eada;width:100%;max-width:520px;" />
        </div>
        <div id="product-container"></div>
    </div>

    <script src="products.js"></script>
    <script src="category.js"></script>
</body>
</html>
